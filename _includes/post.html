<!DOCTYPE html>
<html lang="en" class="has-navbar-fixed-top">

    {% include "_head.html" %}
  
    <body>
      
    {% include "_navbar.html" %}

    <header style="background: url('{{ media.hero.src }}') no-repeat center center; background-size: cover;">
      <div class="hero is-fullheight-with-navbar" style="background-color: rgba(0, 0, 0, 0.5);">
        <div class="hero-body">
          <div class="container has-text-centered">
            <h1 class="title has-text-grey-lighter is-size-1">
              {{ title }}
            </h1>
          </div>
        </div>
        <div class="hero-foot" style="background-color: rgba(0, 0, 0, 0.3);">
          <div class="container has-text-right p-2">
            <span class="has-text-grey-lighter">
              <span class="icon">
                <i class="fas fa-pencil"></i>
              </span> 
              {{ page.date | date: "%Y-%m-%d" }}
              |
              <span class="icon">
                <i class="fas fa-glasses"></i>
              </span> 
              <span>{{ readingTime }}</span>
            </span>
              
          </div>
        </div>
      </div>
    </header>

    <section class="section">
      <div class="container">
        <div class="columns is-centered">
          <div class="column is-three-fifths">
            <div class="columns is-centered is-mobile">
              <div class="column is-four-fifths">
                <blockquote class="block box has-background-light is-italic mb-5">
                  {{ excerpt }}
                </blockquote>
              </div>
            </div>
            <article class="content block">
              {{ content }}
            </article>
            <div class="has-text-centered my-5">
              <button id="like-btn" class="like-btn" data-slug="{{ page.url }}">
                <span class="icon"><i id="like-icon" class="far fa-heart"></i></span>
                <span id="like-count" class="like-count"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
            
      {% include "_get-notified.html" %}
      
    </section>

    <footer>
      {% include "_footer.html" %}
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/glightbox@3.3.0/dist/js/glightbox.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        GLightbox({
          selector: '[data-glightbox]',
          touchNavigation: true,
          loop: true,
          closeOnOutsideClick: true
        });
      });
    </script>
    <script>
      (function() {
        var API = "{{ site.likesApiUrl }}".replace(/\/+$/, "");
        var btn = document.getElementById("like-btn");
        var icon = document.getElementById("like-icon");
        var countEl = document.getElementById("like-count");
        var slug = btn.getAttribute("data-slug");
        var storageKey = "liked:" + slug;
        var liked = false;

        function showCount(n) {
          if (n > 0) {
            countEl.textContent = n;
            countEl.style.display = "inline";
          }
        }

        function setLiked() {
          liked = true;
          btn.classList.add("is-liked");
          icon.classList.replace("far", "fas");
        }

        if (localStorage.getItem(storageKey)) {
          setLiked();
        }

        if (!API) return;

        fetch(API + "/likes/" + encodeURIComponent(slug))
          .then(function(r) { return r.json(); })
          .then(function(data) { showCount(data.likes); })
          .catch(function() {});

        btn.addEventListener("click", function() {
          if (liked) return;
          setLiked();
          localStorage.setItem(storageKey, "1");

          fetch(API + "/likes/" + encodeURIComponent(slug), { method: "POST" })
            .then(function(r) { return r.json(); })
            .then(function(data) { showCount(data.likes); })
            .catch(function() {});
        });
      })();
    </script>
  </body>
</html>
